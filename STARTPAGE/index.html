<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>RED4 Browser Client TM</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div class="app-window">

        <div class="title-bar">
            <span>2HB RED 4 - <span class="info-value" id="os-display">Detektálás...</span>
                | Build: 67.6.9.CC.K2 |</span>
            <div class="window-controls">_ X</div>
        </div>

        <div class="info-bar">
            <div>
                <span class="info-label">Processzor:</span>
                <span class="info-value">OBFUSZKÁLVA</span>
            </div>
            <div>
                <span class="info-label">Rendszer:</span>
                <span class="info-value" id="os-display2">Detektálás...</span>
            </div>
        </div>

        <div class="content-area">
            <!-- Main Menu View -->
            <div id="main-view" class="view-transition" style="display: flex; width: 100%; justify-content: space-between;">
                <div class="button-column">
                    <button class="fox-btn" onclick="navigateTo('Reklámvédelem')">Reklámvédelem</button>
                    <button class="fox-btn" onclick="navigateTo('Telepítő központ')">Telepítő központ</button>
                    <button class="fox-btn" onclick="navigateTo('Téma és felület')">Téma és felület</button>
                    <button class="fox-btn" onclick="navigateTo('Speciális beállítások')">Speciális beállítások</button>
                    <button class="fox-btn" onclick="navigateTo('Felügyeleti eszközök')">Felügyeleti eszközök</button>
                    <button class="fox-btn" onclick="navigateTo('FoxComm eszközök')">FoxComm eszközök</button>
                </div>

                <div style="text-align: center; flex-grow: 1;">
                    <div class="text-outline">2HB RED 4 Toadstool</div>
                    <img src="../asset/Gemini_Generated_Image_bf0y8fbf0y8fbf0y.png" alt="mascot" class="mascot">
                    <br><br><br><br><br><br>
                    <div class="text-glow">DESKTOP VERSION</div>
                </div>

                <div class="button-column">
                    <button class="fox-btn" onclick="navigateTo('Cell Menü')">Cell Menü</button>
                    <button class="fox-btn" onclick="navigateTo('Windows összetevők')">Windows összetevők</button>
                    <button class="fox-btn" onclick="navigateTo('Hálózat és VPN')">Hálózat és VPN</button>
                    <button class="fox-btn" onclick="navigateTo('Tartománykezelő')">Tartománykezelő</button>
                    <button class="fox-btn" onclick="navigateTo('Driverkezelés')">Driverkezelés</button>
                    <button class="fox-btn" onclick="navigateTo('Névjegy')">Névjegy</button>
                </div>
            </div>

            <!-- Sub Page View -->
            <div id="sub-view" class="sub-page-container hidden">
                <h2 id="sub-page-title">Cím</h2>
                <div class="sub-page-content">
                    <p id="sub-page-text">A kiválasztott modul betöltése folyamatban...</p>
                </div>
                <button class="fox-btn" onclick="goBack()">Vissza a főmenübe</button>
            </div>
        </div>

        <div class="footer-bar">
            <span>Sporecap build</span>
            <span>Build: 67.6.9.CC.K2</span>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let os = "Ismeretlen OS";
            const ua = window.navigator.userAgent;

            if (ua.indexOf("Windows NT 10.0") !== -1) os = "Windows 10/11";
            else if (ua.indexOf("Windows NT 6.3") !== -1) os = "Windows 8.1";
            else if (ua.indexOf("Windows NT 6.2") !== -1) os = "Windows 8";
            else if (ua.indexOf("Windows NT 6.1") !== -1) os = "Windows 7";
            else if (ua.indexOf("Android") !== -1) {
                const match = ua.match(/Android\s([0-9\.]+)/);
                os = match ? "Android " + match[1] : "Android";
            } else if (ua.indexOf("Mac OS X") !== -1) {
                const match = ua.match(/Mac OS X\s?([0-9_|\.]+)/);
                if (match) {
                    os = "macOS " + match[1].replace(/_/g, '.');
                } else {
                    os = "macOS";
                }
            } else if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) {
                const match = ua.match(/OS\s([0-9_]+)/);
                os = match ? "iOS " + match[1].replace(/_/g, '.') : "iOS";
            } else if (ua.indexOf("Linux") !== -1) {
                os = "Linux";
            }

            document.getElementById('os-display').textContent = os;
            document.getElementById('os-display2').textContent = os;
        });

        function navigateTo(pageName) {
            const mainView = document.getElementById('main-view');
            const subView = document.getElementById('sub-view');
            const title = document.getElementById('sub-page-title');
            const text = document.getElementById('sub-page-text');

            title.textContent = pageName;
            text.textContent = `A(z) ${pageName} modul sikeresen betöltve a RED 4 rendszermagba. Itt érheti el az adott funkcióhoz tartozó speciális beállításokat és diagnosztikai eszközöket.`;

            mainView.classList.add('hidden');
            subView.classList.remove('hidden');
            subView.classList.remove('view-transition');
            void subView.offsetWidth; // Trigger reflow for animation
            subView.classList.add('view-transition');
        }

        function goBack() {
            const mainView = document.getElementById('main-view');
            const subView = document.getElementById('sub-view');

            subView.classList.add('hidden');
            mainView.classList.remove('hidden');
            mainView.classList.remove('view-transition');
            void mainView.offsetWidth; // Trigger reflow for animation
            mainView.classList.add('view-transition');
        }
    </script>

</body>

</html>
